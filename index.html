<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Duck Community - Roblox Executors</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav class="navbar">
    <div class="navbar-left">
      <div class="navbar-logo">
        <img src="https://files.catbox.moe/19t3ey.png" alt="Logo" />
      </div>
      <span class="navbar-title">Roblox Executors</span>
    </div>
    <div class="navbar-right">
      <button class="btn-discord" onclick="window.open('https://discord.gg/ekxRybWgmh','_blank')">
        Join Discord
      </button>
    </div>
  </nav>

  <div class="wrap">
    <header class="hero">
      <p class="hero-eyebrow">Duck Community</p>
      <h1>Find the Executor<br /><span class="gradient-text">You Want</span></h1>
      <p class="hero-sub">Search and discover the best Roblox executors for your platform</p>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="total-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Online</div>
          <div class="stat-value online" id="online-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Offline</div>
          <div class="stat-value offline" id="offline-count">0</div>
        </div>
      </div>

      <div class="controls-row">
        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="q" class="search" placeholder="Search executors..." />
        </div>
        <select id="filter" class="select">
          <option value="all">All Status</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
          <option value="hasVng">Has VNG</option>
        </select>
      </div>

      <div class="platform-row">
        <button class="platform-btn active" onclick="showOnly('all',this)">All Platforms</button>
        <button class="platform-btn" onclick="showOnly('android',this)">Android</button>
        <button class="platform-btn" onclick="showOnly('ios',this)">iOS</button>
        <button class="platform-btn" onclick="showOnly('windows',this)">Windows</button>
        <button class="platform-btn" onclick="showOnly('macos',this)">macOS</button>
      </div>
    </header>

    <main>
      <div id="android-section" class="platform-section">
        <h2 class="section-title">Android <span class="section-count" id="android-count">0</span></h2>
        <div id="grid-android" class="grid"></div>
      </div>
      <div id="ios-section" class="platform-section">
        <h2 class="section-title">iOS <span class="section-count" id="ios-count">0</span></h2>
        <div id="grid-ios" class="grid"></div>
      </div>
      <div id="windows-section" class="platform-section">
        <h2 class="section-title">Windows <span class="section-count" id="windows-count">0</span></h2>
        <div id="grid-windows" class="grid"></div>
      </div>
      <div id="macos-section" class="platform-section">
        <h2 class="section-title">macOS <span class="section-count" id="macos-count">0</span></h2>
        <div id="grid-macos" class="grid"></div>
      </div>

      <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-title">No executors found</div>
        <div class="empty-sub">Try adjusting your search or filters</div>
      </div>
    </main>
  </div>
</div>

<script src="exe.js"></script>
<script src="script.js"></script>

</body>
</html>
